{% extends "base.html" %}
{% block title %}Admin &mdash; UNSAID{% endblock %}
{% block content %}
<section class="dark-panel bg-shell px-5 py-32 text-canvas sm:px-8 lg:px-12"><div class="luxury-surface mx-auto max-w-md border border-canvas/12 bg-canvas/5 p-8 backdrop-blur-xl sm:p-10"><p class="text-[0.72rem] uppercase tracking-[0.14em] text-canvas/54">Admin</p><h1 class="mt-6 font-display text-5xl leading-none">Order desk.</h1>{% if error %}<p class="mt-5 text-sm text-red-200">{{ error }}</p>{% endif %}<form method="post" action="/admin/login" class="mt-8 space-y-5"><label class="block"><span class="text-[0.72rem] text-canvas/60">Email</span><input required name="email" type="email" class="mt-3 w-full border-b border-canvas/20 bg-transparent py-4 text-sm outline-none focus:border-metal"></label><label class="block"><span class="text-[0.72rem] text-canvas/60">Password</span><input required name="password" type="password" class="mt-3 w-full border-b border-canvas/20 bg-transparent py-4 text-sm outline-none focus:border-metal"></label><button class="w-full border border-canvas bg-canvas px-6 py-4 text-[0.72rem] font-semibold uppercase tracking-[0.12em] text-shell">Enter admin</button></form></div></section>
{% endblock %}

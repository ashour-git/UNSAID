{% extends "base.html" %}
{% block seo %}
<meta property="og:type" content="website">
<meta property="og:title" content="Private Account &mdash; UNSAID">
<meta property="og:description" content="Sign in to your private UNSAID account.">
<meta property="og:image" content="{{ settings.site_url }}/static/images/editorial/unsaid-hero-1.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ settings.site_url }}/static/images/editorial/unsaid-hero-1.jpg">
<link rel="canonical" href="{{ request.url }}">
{% endblock %}
{% block title %}Private Account &mdash; UNSAID{% endblock %}
{% block content %}
<section class="bg-canvas px-5 py-32 sm:px-8 lg:px-12">
    <div class="luxury-surface mx-auto max-w-md border border-shell/10 bg-paper p-8 sm:p-10">
        <p class="text-[0.72rem] uppercase tracking-[0.14em] text-mute" data-i18n="account.privateAccount">Private account</p>
        <h1 class="mt-6 font-display text-5xl leading-none text-shell" data-i18n="account.signIn">Sign in.</h1>
        {% if error %}<p class="mt-5 text-sm text-red-700">{{ error }}</p>{% endif %}
        <form method="post" action="/account/login" class="mt-8 space-y-5">
            <label class="block"><span class="text-[0.72rem] text-mute" data-i18n="account.email">Email</span><input required name="email" type="email" autocomplete="email" class="mt-3 w-full border-b border-shell/10 bg-transparent py-4 text-sm outline-none focus:border-metal"></label>
            <label class="block"><span class="text-[0.72rem] text-mute" data-i18n="account.password">Password</span><input required name="password" type="password" autocomplete="current-password" class="mt-3 w-full border-b border-shell/10 bg-transparent py-4 text-sm outline-none focus:border-metal"></label>
            <button class="w-full border border-shell bg-shell px-6 py-4 text-[0.72rem] font-semibold uppercase tracking-[0.12em] text-canvas" data-i18n="account.enterAccount">Enter account</button>
        </form>
        <p class="mt-6 text-sm text-mute"><span data-i18n="account.noAccount">No account yet?</span> <a href="/account/signup" class="text-shell underline" data-i18n="account.createOne">Create one</a>.</p>
    </div>
</section>
{% endblock %}

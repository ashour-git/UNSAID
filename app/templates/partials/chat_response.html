<div class="space-y-4">
    {% if user_message %}
    <div class="flex justify-end">
        <div class="max-w-[82%] border border-shell/10 bg-shell px-4 py-3 text-sm leading-6 text-canvas">
            {{ user_message }}
        </div>
    </div>
    {% endif %}
    <div class="flex items-start gap-3">
        <span class="mt-1 flex h-7 w-7 shrink-0 items-center justify-center rounded-full border border-shell/10 bg-paper text-[0.55rem] font-semibold uppercase tracking-wide text-shell">AI</span>
        <div class="max-w-[85%] border border-shell/8 bg-paper px-4 py-3 text-sm leading-6 text-text">
            {{ response }}
        </div>
    </div>
</div>

<div class="flex h-full flex-col">
    <div class="flex items-center justify-between border-b border-shell/8 bg-paper/35 px-5 py-4">
        <div>
            <p class="text-[0.72rem] text-shell" data-i18n="chat.title">UNSAID Consultant</p>
            <p class="mt-1 text-[0.65rem] text-mute" data-i18n="chat.subtitle">Private fragrance guidance</p>
        </div>
        <button type="button" @click="chatOpen = false" class="text-sm text-mute transition duration-500 hover:text-shell" data-i18n="nav.close">Close</button>
    </div>
    <div class="border-b border-shell/8 bg-paper/20 px-5 py-4">
        <p class="text-[0.72rem] text-mute" data-i18n="chat.begin">Begin with a direction</p>
        <div class="mt-3 flex flex-wrap gap-2">
            <button type="button" hx-post="/api/chat/message" hx-target="#chat-messages" hx-swap="beforeend" hx-vals='{"message":"I want a fresh office scent with polish and restraint."}' class="border border-shell/10 px-3 py-2 text-[0.68rem] text-shell transition duration-500 hover:border-shell hover:bg-shell hover:text-canvas" data-i18n="chat.fresh">Fresh office</button>
            <button type="button" hx-post="/api/chat/message" hx-target="#chat-messages" hx-swap="beforeend" hx-vals='{"message":"I want something dark, smoky, and memorable for evening."}' class="border border-shell/10 px-3 py-2 text-[0.68rem] text-shell transition duration-500 hover:border-shell hover:bg-shell hover:text-canvas" data-i18n="chat.dark">Dark evening</button>
            <button type="button" hx-post="/api/chat/message" hx-target="#chat-messages" hx-swap="beforeend" hx-vals='{"message":"I need a refined gift that feels expensive and intimate."}' class="border border-shell/10 px-3 py-2 text-[0.68rem] text-shell transition duration-500 hover:border-shell hover:bg-shell hover:text-canvas" data-i18n="chat.gift">Refined gift</button>
        </div>
    </div>
    <div id="chat-messages" class="flex-1 overflow-y-auto px-5 py-4 space-y-4">
        <div class="flex items-start gap-3">
            <span class="mt-1 flex h-7 w-7 shrink-0 items-center justify-center rounded-full border border-shell/8 bg-paper text-[0.6rem] text-shell">AI</span>
            <div class="max-w-[85%] border border-shell/8 bg-paper px-4 py-3 text-sm leading-6 text-shell/86">
                <span data-i18n="chat.welcome">Welcome to UNSAID. Tell me the atmosphere, the setting, or the impression you want to leave, and I will narrow the collection with precision.</span>
            </div>
        </div>
    </div>
    <form class="border-t border-shell/8 bg-paper/25 px-5 py-4" hx-post="/api/chat/message" hx-target="#chat-messages" hx-swap="beforeend" hx-on::after-request="this.reset()">
        <div class="flex gap-2">
            <label class="sr-only" for="chat-message-input">Message</label>
            <input id="chat-message-input" type="text" name="message" placeholder="Describe your ideal scent..." data-i18n-placeholder="chat.placeholder" class="flex-1 border border-shell/10 bg-transparent px-4 py-3 text-sm text-shell outline-none transition duration-500 focus:border-metal placeholder:text-soft" autocomplete="off">
            <button type="submit" class="border border-shell bg-shell px-4 py-3 text-[0.72rem] font-semibold uppercase tracking-[0.12em] text-canvas transition duration-500 hover:bg-metal hover:border-metal" data-i18n="chat.send">Send</button>
        </div>
        <p class="htmx-indicator mt-3 text-[0.65rem] text-mute" data-i18n="chat.thinking">Consultant is thinking...</p>
    </form>
</div>

{% extends "base.html" %}
{% block content %}
<section class="dark-panel min-h-screen bg-shell px-5 py-28 text-canvas sm:px-8 lg:px-12">
    <div class="mx-auto max-w-[1500px]">
        <div class="mb-10 flex flex-col gap-5 border-b border-canvas/10 pb-8 sm:flex-row sm:items-end sm:justify-between">
            <div><p class="text-[0.72rem] uppercase tracking-[0.14em] text-canvas/54">UNSAID admin</p><h1 class="mt-3 font-display text-5xl leading-none">{% block admin_title %}Dashboard{% endblock %}</h1></div>
            <div class="flex flex-wrap gap-3 text-sm"><a href="/admin" class="text-canvas/72 hover:text-canvas">Dashboard</a><a href="/admin/orders" class="text-canvas/72 hover:text-canvas">Orders</a><a href="/admin/products" class="text-canvas/72 hover:text-canvas">Products</a><a href="/admin/insights" class="text-canvas/72 hover:text-canvas">Insights</a><form method="post" action="/admin/logout"><button class="text-canvas/72 hover:text-canvas">Sign out</button></form></div>
        </div>
        {% block admin_content %}{% endblock %}
    </div>
</section>
{% endblock %}

<div class="flex h-full flex-col">
    <div class="flex items-center justify-between border-b border-shell/8 px-5 py-4">
        <div>
            <p class="text-xs font-semibold uppercase tracking-[0.18em] text-shell">UNSAID Consultant</p>
            <p class="mt-1 text-[0.65rem] text-mute">Private fragrance guidance</p>
        </div>
        <button type="button" @click="chatOpen = false" class="text-xs uppercase tracking-[0.18em] text-mute transition duration-500 hover:text-shell">Close</button>
    </div>
    <div class="border-b border-shell/8 px-5 py-4">
        <p class="text-[0.62rem] font-semibold uppercase tracking-[0.18em] text-mute">Begin with a direction</p>
        <div class="mt-3 flex flex-wrap gap-2">
            <button type="button" hx-post="/api/chat/message" hx-target="#chat-messages" hx-swap="beforeend" hx-vals='{"message":"I want a fresh office scent with polish and restraint."}' class="border border-shell/10 px-3 py-2 text-[0.58rem] font-semibold uppercase tracking-[0.18em] text-shell transition duration-500 hover:border-shell hover:bg-shell hover:text-canvas">Fresh office</button>
            <button type="button" hx-post="/api/chat/message" hx-target="#chat-messages" hx-swap="beforeend" hx-vals='{"message":"I want something dark, smoky, and memorable for evening."}' class="border border-shell/10 px-3 py-2 text-[0.58rem] font-semibold uppercase tracking-[0.18em] text-shell transition duration-500 hover:border-shell hover:bg-shell hover:text-canvas">Dark evening</button>
            <button type="button" hx-post="/api/chat/message" hx-target="#chat-messages" hx-swap="beforeend" hx-vals='{"message":"I need a refined gift that feels expensive and intimate."}' class="border border-shell/10 px-3 py-2 text-[0.58rem] font-semibold uppercase tracking-[0.18em] text-shell transition duration-500 hover:border-shell hover:bg-shell hover:text-canvas">Refined gift</button>
        </div>
    </div>
    <div id="chat-messages" class="flex-1 overflow-y-auto px-5 py-4 space-y-4">
        <div class="flex items-start gap-3">
            <span class="mt-1 flex h-7 w-7 shrink-0 items-center justify-center rounded-full border border-shell/10 bg-paper text-[0.55rem] font-semibold uppercase tracking-[0.18em] text-shell">AI</span>
            <div class="max-w-[85%] border border-shell/8 bg-paper px-4 py-3 text-sm leading-6 text-shell/86">
                Welcome to UNSAID. Tell me the atmosphere, the setting, or the impression you want to leave, and I will narrow the collection with precision.
            </div>
        </div>
    </div>
    <form class="border-t border-shell/8 px-5 py-4" hx-post="/api/chat/message" hx-target="#chat-messages" hx-swap="beforeend" hx-on::after-request="this.reset()">
        <div class="flex gap-2">
            <input type="text" name="message" placeholder="Describe your ideal scent..." class="flex-1 border border-shell/10 bg-transparent px-4 py-3 text-sm text-shell outline-none transition duration-500 focus:border-metal placeholder:text-soft" autocomplete="off">
            <button type="submit" class="border border-shell bg-shell px-4 py-3 text-xs font-semibold uppercase tracking-[0.18em] text-canvas transition duration-500 hover:bg-metal hover:border-metal">Send</button>
        </div>
        <p class="htmx-indicator mt-3 text-[0.65rem] text-mute">Consultant is thinking...</p>
    </form>
</div>

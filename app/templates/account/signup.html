{% extends "base.html" %}
{% block seo %}
<meta property="og:type" content="website">
<meta property="og:title" content="Create Account &mdash; UNSAID">
<meta property="og:description" content="Create a private UNSAID client account.">
<meta property="og:image" content="{{ settings.site_url }}/static/images/editorial/unsaid-hero-1.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ settings.site_url }}/static/images/editorial/unsaid-hero-1.jpg">
<link rel="canonical" href="{{ request.url }}">
{% endblock %}
{% block title %}Create Account &mdash; UNSAID{% endblock %}
{% block content %}
<section class="bg-canvas px-5 py-32 sm:px-8 lg:px-12">
    <div class="luxury-surface mx-auto max-w-2xl border border-shell/10 bg-paper p-8 sm:p-10">
        <p class="text-[0.72rem] uppercase tracking-[0.14em] text-mute" data-i18n="account.privateClient">Private client record</p>
        <h1 class="mt-6 font-display text-5xl leading-none text-shell" data-i18n="account.createAccount">Create account.</h1>
        {% if error %}<p class="mt-5 text-sm text-red-700">{{ error }}</p>{% endif %}
        <form method="post" action="/account/signup" class="mt-8 grid gap-5 sm:grid-cols-2">
            <label class="block sm:col-span-2"><span class="text-[0.72rem] text-mute" data-i18n="account.fullName">Full name</span><input required name="full_name" type="text" autocomplete="name" class="mt-3 w-full border-b border-shell/10 bg-transparent py-4 text-sm outline-none focus:border-metal"></label>
            <label class="block"><span class="text-[0.72rem] text-mute" data-i18n="account.email">Email</span><input required name="email" type="email" autocomplete="email" class="mt-3 w-full border-b border-shell/10 bg-transparent py-4 text-sm outline-none focus:border-metal"></label>
            <label class="block"><span class="text-[0.72rem] text-mute" data-i18n="account.phone">Phone</span><input name="phone" type="tel" autocomplete="tel" class="mt-3 w-full border-b border-shell/10 bg-transparent py-4 text-sm outline-none focus:border-metal"></label>
            <label class="block"><span class="text-[0.72rem] text-mute" data-i18n="account.city">City</span><input name="city" type="text" autocomplete="address-level2" class="mt-3 w-full border-b border-shell/10 bg-transparent py-4 text-sm outline-none focus:border-metal"></label>
            <label class="block"><span class="text-[0.72rem] text-mute" data-i18n="account.password">Password</span><input required name="password" type="password" autocomplete="new-password" class="mt-3 w-full border-b border-shell/10 bg-transparent py-4 text-sm outline-none focus:border-metal"></label>
            <label class="block sm:col-span-2"><span class="text-[0.72rem] text-mute" data-i18n="account.shippingAddress">Default shipping address</span><textarea name="shipping_address" rows="3" class="mt-3 w-full resize-none border-b border-shell/10 bg-transparent py-4 text-sm outline-none focus:border-metal"></textarea></label>
            <label class="flex items-center gap-3 text-sm text-mute sm:col-span-2"><input name="marketing_opt_in" type="checkbox" class="h-4 w-4"> <span data-i18n="account.receiveReleases">Receive release notes and private events.</span></label>
            <button class="border border-shell bg-shell px-6 py-4 text-[0.72rem] font-semibold uppercase tracking-[0.12em] text-canvas sm:col-span-2" data-i18n="account.createAccount">Create account</button>
        </form>
    </div>
</section>
{% endblock %}

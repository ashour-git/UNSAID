app = "unsaid-perfumes"
primary_region = "ams"

[build]

[env]
  ENVIRONMENT = "production"
  DEBUG = "false"
  ENABLE_HSTS = "true"
  SESSION_COOKIE_SECURE = "true"
  SITE_URL = "https://unsaid-perfumes.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[mounts]
  source = "uploads"
  destination = "/app/app/static/uploads"

[deploy]
  release_command = "alembic upgrade head"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://unsaid:unsaid_secret@db:5432/unsaid
      - SESSION_COOKIE_SECURE=false
      - SITE_URL=http://localhost:8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./app/static:/app/app/static
      - ./app/img:/app/app/img
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: unsaid
      POSTGRES_PASSWORD: unsaid_secret
      POSTGRES_DB: unsaid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unsaid"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app/static:/app/static:ro
      - ./app/img:/app/img:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data: